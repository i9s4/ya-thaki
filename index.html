<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>يا ذكي — المساعد الدراسي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0F1117;--bg2:#1A1D2E;--bg3:#232740;--border:#2E3250;--text:#F0F2FF;--text2:#9BA3C7;--text3:#5C6490;--purple:#7C6EFF;--purple2:#5A4FCC;--pg:#7C6EFF22;--teal:#00D4AA;--tg:#00D4AA15;--pink:#FF6B9D;--amber:#FFB347;--red:#FF5C5C;--r:14px;--rs:8px;}
body.light{--bg:#F8F9FF;--bg2:#FFFFFF;--bg3:#EEF0FF;--border:#DDE0F5;--text:#1A1D2E;--text2:#4A5080;--text3:#9BA3C7;--purple:#5A4FCC;--purple2:#7C6EFF;--pg:#7C6EFF18;--teal:#00A886;--tg:#00D4AA12;--pink:#E8527A;--amber:#CC8800;--red:#CC3333;}
html,body{height:100%;font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
#app{min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Cairo',system-ui;font-size:14px;font-weight:600;transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-p{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;}
.btn-p:hover{opacity:.9;}
.btn-s{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-s:hover{border-color:var(--purple);color:var(--purple);}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-g:hover{background:var(--bg3);}
.btn-d{background:#FF5C5C22;color:var(--red);border:1px solid #FF5C5C33;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-lg{padding:14px 28px;font-size:16px;}
.btn-f{width:100%;}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=time],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;font-size:14px;font-family:'Cairo',system-ui;color:var(--text);direction:rtl;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--purple);}
input::placeholder,textarea::placeholder{color:var(--text3);}
.lbl{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.ig{margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:99px;font-weight:500;}
.pp{background:var(--pg);color:var(--purple);}
.pt{background:var(--tg);color:var(--teal);}
.pa{background:#FFB34720;color:var(--amber);}
.pr{background:#FF5C5C18;color:var(--red);}
.pk{background:#FF6B9D18;color:var(--pink);}
.divt{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divt span{font-size:12px;color:var(--text3);white-space:nowrap;}
.divt::before,.divt::after{content:'';flex:1;height:1px;background:var(--border);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.av-sm{width:32px;height:32px;font-size:12px;}
.av-md{width:40px;height:40px;font-size:15px;}
.av-lg{width:52px;height:52px;font-size:18px;}
.av-p{background:linear-gradient(135deg,#7C6EFF,#5A4FCC);color:#fff;}
.av-k{background:linear-gradient(135deg,#FF6B9D,#CC3D6E);color:#fff;}
.av-t{background:linear-gradient(135deg,#00D4AA,#00A886);color:#fff;}
.av-a{background:linear-gradient(135deg,#FFB347,#CC8800);color:#fff;}
.av-b{background:linear-gradient(135deg,#4A9EFF,#2563EB);color:#fff;}
.pb{height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.pf{height:100%;border-radius:99px;transition:width .4s ease;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.md{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.mt{font-size:17px;font-weight:700;color:var(--text);}
.tc{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;}
.t{background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:10px 20px;font-size:13px;color:var(--text);animation:su .3s ease;white-space:nowrap;}
.t.ok{border-color:var(--teal);color:var(--teal);}
.t.er{border-color:var(--red);color:var(--red);}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.top{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.logo{font-size:18px;font-weight:800;color:var(--text);}
.logo span{color:var(--purple);}
.lay{display:flex;min-height:100vh;}
.sb{width:240px;background:var(--bg2);border-left:1px solid var(--border);padding:20px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;}
.sbl{font-size:20px;font-weight:800;color:var(--text);padding:8px 12px;margin-bottom:16px;}
.sbl span{color:var(--purple);}
.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .15s;border:1px solid transparent;}
.si:hover{background:var(--bg3);color:var(--text);}
.si.ac{background:var(--pg);color:var(--purple);border-color:var(--pg);}
.sbot{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
.mc{flex:1;overflow-y:auto;}
.ph{padding:24px 24px 0;margin-bottom:20px;}
.pt2{font-size:22px;font-weight:700;color:var(--text);}
.ps{font-size:13px;color:var(--text3);margin-top:4px;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:0 24px;margin-bottom:24px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.sv{font-size:28px;font-weight:700;}
.sl{font-size:11px;color:var(--text3);margin-top:4px;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);}
.ti{padding:12px 20px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;}
.ti:hover{color:var(--text2);}
.ti.ac{color:var(--purple);border-bottom-color:var(--purple);}
.es{text-align:center;padding:48px 24px;}
.ei{font-size:48px;margin-bottom:12px;}
.et{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.esb{font-size:13px;color:var(--text3);margin-bottom:20px;}
.tz{border:1.5px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.tz:hover,.tz.do{border-color:var(--purple);background:var(--pg);}
.bn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0;z-index:100;}
.bni{display:flex;justify-content:space-around;}
.bi{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;color:var(--text3);font-size:10px;}
.bi.ac{color:var(--purple);}
.bic{font-size:20px;}
.sw-t{width:38px;height:22px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;position:relative;transition:background .2s;cursor:pointer;}
.sw-t.on{background:var(--purple);border-color:var(--purple);}
.sw-th{position:absolute;top:2px;right:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
.sw-t.on .sw-th{transform:translateX(-16px);}
.wc{display:flex;align-items:flex-end;gap:6px;height:60px;}
.wb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.wbr{width:100%;border-radius:4px 4px 0 0;min-height:4px;background:var(--pg);}
.wbr.td{background:var(--purple);}
.wd{font-size:9px;color:var(--text3);}
.bub{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;}
.bai{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:16px 16px 4px 16px;}
.bur{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border-radius:16px 16px 16px 4px;}
.sp{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:768px){.sb{display:none;}.sg{grid-template-columns:repeat(2,1fr);padding:0 16px;}.ph{padding:16px 16px 0;}.bn{display:block;}#app{padding-bottom:70px;}}
</style>
</head>
<body class="dark" id="body">
<div id="app"></div>
<div class="tc" id="tc"></div>
<script>
// ========== DB ==========
const DK='ya_thaki_v2';
function gdb(){try{const r=localStorage.getItem(DK);return r?JSON.parse(r):idb();}catch{return idb();}}
function sdb(d){localStorage.setItem(DK,JSON.stringify(d));}
function idb(){const d={s:{apiKey:'',theme:'dark',aEmail:'',aName:''},subjects:{},users:{},tests:[]};sdb(d);return d;}
function gs(){return gdb().s;}
function ss(s){const d=gdb();d.s={...d.s,...s};sdb(d);}
function gsubj(g){return gdb().subjects[g]||[];}
function ssubj(g,s){const d=gdb();if(!d.subjects[g])d.subjects[g]=[];const i=d.subjects[g].findIndex(x=>x.id===s.id);if(i>=0)d.subjects[g][i]=s;else d.subjects[g].push(s);sdb(d);}
function dsubj(g,id){const d=gdb();if(d.subjects[g])d.subjects[g]=d.subjects[g].filter(s=>s.id!==id);sdb(d);}
function gusers(){return gdb().users;}
function guser(id){return gdb().users[id];}
function gubyemail(e){return Object.values(gdb().users).find(u=>u.email===e);}
function suser(u){const d=gdb();d.users[u.id]=u;sdb(d);}
function duser(id){const d=gdb();delete d.users[id];sdb(d);}
function gpending(){return Object.values(gdb().users).filter(u=>!u.approved&&!u.isAdmin);}
function gstudents(){return Object.values(gdb().users).filter(u=>u.approved&&!u.isAdmin);}
function canask(uid){const u=guser(uid);if(!u)return false;if(u.limitOpen)return true;const t=new Date().toDateString();if(u.lastDate!==t){u.questionsToday=0;u.lastDate=t;suser(u);}return(u.questionsToday||0)<(u.dailyLimit||20);}
function incq(uid){const u=guser(uid);if(!u)return;const t=new Date().toDateString();if(u.lastDate!==t){u.questionsToday=0;u.lastDate=t;}u.questionsToday=(u.questionsToday||0)+1;suser(u);}
function remq(uid){const u=guser(uid);if(!u)return 0;if(u.limitOpen)return 999;const t=new Date().toDateString();const used=u.lastDate===t?(u.questionsToday||0):0;return Math.max(0,(u.dailyLimit||20)-used);}
function inhours(uid){const u=guser(uid);if(!u)return false;if(!u.allowedHours||u.allowedHours.open)return true;const now=new Date();const cur=now.getHours()*60+now.getMinutes();const[fh,fm]=(u.allowedHours.from||'00:00').split(':').map(Number);const[th,tm]=(u.allowedHours.to||'23:59').split(':').map(Number);return cur>=fh*60+fm&&cur<=th*60+tm;}
function stest(t){const d=gdb();d.tests.push(t);sdb(d);}
function gtests(uid){return gdb().tests.filter(t=>t.userId===uid);}
function galltests(){return gdb().tests;}
function tstats(uid){const ts=gtests(uid);if(!ts.length)return{total:0,avg:0,weak:[]};const avg=Math.round(ts.reduce((s,t)=>s+(t.score/t.total*100),0)/ts.length);const wm={};ts.forEach(t=>(t.wrongTopics||[]).forEach(w=>{wm[w]=(wm[w]||0)+1;}));const weak=Object.entries(wm).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t])=>t);return{total:ts.length,avg,weak};}
function gsession(){try{return JSON.parse(sessionStorage.getItem('yt_sess'));}catch{return null;}}
function ssession(u){sessionStorage.setItem('yt_sess',JSON.stringify(u));}
function csession(){sessionStorage.removeItem('yt_sess');}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fdate(iso){return new Date(iso).toLocaleDateString('ar-KW',{year:'numeric',month:'short',day:'numeric'});}
function glabel(g){const n={1:'أول',2:'ثاني',3:'ثالث',4:'رابع',5:'خامس',6:'سادس',7:'سابع',8:'ثامن',9:'تاسع',10:'عاشر',11:'حادي عشر',12:'ثاني عشر'};return`الصف ${n[g]||g}`;}
function avclass(name){const cs=['av-p','av-k','av-t','av-a','av-b'];return cs[name.charCodeAt(0)%cs.length];}

// ========== UTILS ==========
let _theme=localStorage.getItem('yt_theme')||'dark';
function setTheme(t){_theme=t;document.body.className=t;localStorage.setItem('yt_theme',t);}
setTheme(_theme);
function toast(msg,type=''){const c=document.getElementById('tc');const el=document.createElement('div');el.className=`t ${type}`;el.textContent=msg;c.appendChild(el);setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300);},3000);}
let _page='',_params={},_user=null;
function nav(page,params={}){_page=page;_params=params;render();}
function logout(){csession();_user=null;_page='';render();}

// ========== AI ==========
async function callAI(apiKey,system,messages){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:2048,system,messages})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`خطأ ${r.status}`);}
  const d=await r.json();return d.content?.map(b=>b.text||'').join('')||'';
}
async function extractPDF(file,apiKey){
  return new Promise(res=>{
    const fr=new FileReader();
    fr.onload=async e=>{
      try{
        const b64=e.target.result.split(',')[1];
        const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:4096,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:'استخرج كل النص من هذا الملف بدقة. لا تضف أي تعليق، فقط النص المستخرج.'}]}]})});
        const d=await r.json();res(d.content?.map(b=>b.text||'').join('')||'');
      }catch(e){res('');}
    };fr.readAsDataURL(file);
  });
}
function sysExplain(subj,files){return`أنت مساعد دراسي ذكي لمادة "${subj}". استند على المحتوى التالي فقط:\n\n${files.map(f=>`[${f.name}]\n${f.extractedText||''}`).join('\n\n')}\n\nأجب بالعربية البسيطة الواضحة. كن مشجعاً وإيجابياً.`;}
function sysReview(subj,files){return`أنت مساعد يراجع الطالب على مادة "${subj}".\n\nالمحتوى:\n${files.map(f=>f.extractedText||'').join('\n')}\n\nاطرح أسئلة متنوعة وصحح الإجابات بلطف.`;}
function sysTest(subj,files,n){return`أنت تدير اختباراً على مادة "${subj}" (${n} سؤال).\n\nالمحتوى:\n${files.map(f=>f.extractedText||'').join('\n')}\n\nاطرح سؤالاً واحداً في كل مرة. في النهاية أعطِ النتيجة وأضف:\nRESULT: X/Y | موضوع1,موضوع2`;}
function sysWeak(subj,weak,files){return`أنت مساعد يعالج نقاط الضعف في "${subj}".\nنقاط الضعف: ${weak.join('،')}\n\nالمحتوى:\n${files.map(f=>f.extractedText||'').join('\n')}\n\nركّز على هذه النقاط بطريقة مبسطة.`;}
function parseResult(msg){const m=msg.match(/RESULT:\s*(\d+)\/(\d+)\s*\|\s*(.+)/);if(!m)return null;return{score:parseInt(m[1]),total:parseInt(m[2]),wrongTopics:m[3].split(',').map(t=>t.trim()).filter(Boolean)};}

// ========== RENDER ==========
function render(){
  const app=document.getElementById('app');
  const s=gs();
  const sess=gsession();
  if(!s.aEmail){renderSetup(app);return;}
  if(!sess){renderLogin(app);return;}
  _user=sess;
  if(sess.isAdmin)renderAdmin(app);
  else renderStudent(app);
}

// ========== SETUP ==========
function renderSetup(app){
  app.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden;">
    <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:var(--pg);top:-80px;left:-80px;pointer-events:none;"></div>
    <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:var(--tg);bottom:-60px;right:-60px;pointer-events:none;"></div>
    <div style="width:100%;max-width:420px;position:relative;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:44px;font-weight:800;color:var(--text);margin-bottom:6px;">يا <span style="color:var(--purple)">ذكي</span></div>
        <div style="font-size:13px;color:var(--text3);">إعداد الحساب — مرحباً بك</div>
      </div>
      <div class="card" style="border-radius:20px;padding:24px;">
        <div style="font-size:16px;font-weight:700;margin-bottom:4px;">إعداد حساب المشرف</div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:20px;">هذا الحساب خاص بك كولي أمر</div>
        <div class="ig"><label class="lbl">اسمك</label><input id="sn" type="text" placeholder="مثال: أبو محمد"/></div>
        <div class="ig"><label class="lbl">البريد الإلكتروني</label><input id="se" type="email" placeholder="example@mail.com"/></div>
        <div class="ig"><label class="lbl">كلمة المرور</label><input id="sp" type="password" placeholder="8 أحرف على الأقل"/></div>
        <div class="ig"><label class="lbl">مفتاح الذكاء الاصطناعي</label><input id="sk" type="password" placeholder="sk-ant-..."/><div style="font-size:11px;color:var(--text3);margin-top:5px;">من platform.anthropic.com</div></div>
        <button class="btn btn-p btn-f btn-lg" onclick="doSetup()">إنشاء الحساب والبدء</button>
      </div>
    </div>
  </div>`;
}
function doSetup(){
  const n=document.getElementById('sn').value.trim(),e=document.getElementById('se').value.trim(),p=document.getElementById('sp').value,k=document.getElementById('sk').value.trim();
  if(!n||!e||!p||!k){toast('يرجى تعبئة جميع الحقول','er');return;}
  if(p.length<8){toast('كلمة المرور 8 أحرف على الأقل','er');return;}
  if(!k.startsWith('sk-ant-')){toast('مفتاح الذكاء الاصطناعي غير صحيح','er');return;}
  const id=gid();ss({aEmail:e,aName:n,apiKey:k});
  suser({id,name:n,email:e,password:p,isAdmin:true,approved:true,createdAt:new Date().toISOString()});
  toast('تم إنشاء الحساب','ok');render();
}

// ========== LOGIN ==========
let _lmode='login';
function renderLogin(app){
  app.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);position:relative;overflow:hidden;">
    <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:var(--pg);top:-80px;left:-80px;pointer-events:none;"></div>
    <div style="position:absolute;width:200px;height:200px;border-radius:50%;background:var(--tg);bottom:-60px;right:-60px;pointer-events:none;"></div>
    <div style="width:100%;max-width:420px;position:relative;">
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-size:44px;font-weight:800;color:var(--text);">يا <span style="color:var(--purple)">ذكي</span></div>
        <div style="font-size:13px;color:var(--text3);margin-top:4px;">المساعد الدراسي الذكي لأبنائك</div>
      </div>
      <div class="card" style="border-radius:20px;padding:24px;" id="lcard"></div>
    </div>
  </div>`;
  renderLoginForm();
}
function renderLoginForm(){
  document.getElementById('lcard').innerHTML=`
    <div style="font-size:17px;font-weight:700;margin-bottom:20px;">${_lmode==='login'?'تسجيل الدخول':'إنشاء حساب'}</div>

function doLogin(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  if(!e||!p){toast('يرجى تعبئة الحقول','er');return;}
  if(_lmode==='login'){
    const u=gubyemail(e);if(!u){toast('البريد غير مسجل','er');return;}
    if(u.password!==p){toast('كلمة المرور غير صحيحة','er');return;}
    if(!u.approved&&!u.isAdmin){toast('حسابك قيد المراجعة','er');return;}
    toast(`أهلاً ${u.name}`,'ok');ssession(u);_user=u;render();
  } else {
    const n=document.getElementById('ln')?.value.trim(),g=document.getElementById('lg')?.value;
    if(!n||!e||!p){toast('يرجى تعبئة جميع الحقول','er');return;}
    if(p.length<8){toast('كلمة المرور 8 أحرف على الأقل','er');return;}
    if(gubyemail(e)){toast('البريد مسجل مسبقاً','er');return;}
    suser({id:gid(),name:n,email:e,password:p,grade:parseInt(g),isAdmin:false,approved:false,dailyLimit:20,limitOpen:false,allowedHours:{open:true,from:'14:00',to:'22:00'},questionsToday:0,lastDate:'',createdAt:new Date().toISOString()});
    toast('تم إرسال الطلب — انتظر موافقة ولي الأمر','ok');_lmode='login';renderLoginForm();
  }
}

function showUpload(grade,subjectId,cb){
  const ov=document.createElement('div');ov.className='mo';
  ov.innerHTML=`<div class="md"><div class="mh"><div class="mt">رفع ملف PDF</div><button class="btn btn-g" style="padding:6px 10px;" onclick="this.closest('.mo').remove()">✕</button></div><div class="tz" id="dz"><div style="font-size:32px;margin-bottom:10px;">📂</div><div style="font-size:14px;font-weight:600;color:var(--text2);">اسحب الملف هنا أو اضغط للاختيار</div><div style="font-size:12px;color:var(--text3);margin-top:4px;">PDF فقط — حتى 50MB</div><input type="file" id="fi" accept=".pdf" style="display:none;"/><button class="btn btn-s" style="margin-top:12px;" onclick="document.getElementById('fi').click()">اختر ملف</button></div><div id="ust" style="margin-top:12px;display:none;"><div style="display:flex;align-items:center;gap:10px;"><div class="sp"></div><div id="umsg" style="font-size:13px;color:var(--text2);">جاري رفع الملف...</div></div></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  const dz=document.getElementById('dz'),fi=document.getElementById('fi');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('do');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('do'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('do');hf(e.dataTransfer.files[0]);});
  fi.addEventListener('change',()=>hf(fi.files[0]));
  async function hf(file){
    if(!file)return;
    if(file.type!=='application/pdf'){toast('يرجى اختيار ملف PDF','er');return;}
    if(file.size>50*1024*1024){toast('حجم الملف يجب أن يكون أقل من 50MB','er');return;}
    document.getElementById('ust').style.display='block';dz.style.opacity='.5';dz.style.pointerEvents='none';
    const fr={id:gid(),name:file.name,size:file.size,uploadedAt:new Date().toISOString(),extracted:false,extractedText:''};
    const db=gdb();const sj=db.subjects[grade]?.find(s=>s.id===subjectId);if(!sj){ov.remove();return;}
    if(!sj.files)sj.files=[];sj.files.push(fr);sdb(db);
    document.getElementById('umsg').textContent='جاري استخراج النص من الملف...';
    try{
      const{apiKey}=gs();const txt=await extractPDF(file,apiKey);
      const db2=gdb();const sj2=db2.subjects[grade]?.find(s=>s.id===subjectId);
      if(sj2){const f2=sj2.files?.find(f=>f.id===fr.id);if(f2){f2.extracted=true;f2.extractedText=txt;sdb(db2);}}
      toast('تم رفع الملف وتجهيزه','ok');
    }catch(e){toast('تم رفع الملف (تعذر استخراج النص)','er');}
    ov.remove();cb();
  }
}

async function sendChat(text){
  if(_isLoading)return;
  const subjectId=_params.chatSubj,subjectName=_params.chatName||'المادة';
  if(!canask(_user.id)){toast('وصلت حد الأسئلة اليوم','er');return;}
  if(!inhours(_user.id)){toast('خارج وقت الدراسة','er');return;}
  _isLoading=true;
  const ci=document.getElementById('ci');if(ci)ci.value='';
  const t=new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
  _msgs.push({role:'user',content:text,time:t});
  _msgs.push({role:'assistant',content:'',loading:true,time:''});
  renderSChat(document.getElementById('sc'));
  const{apiKey}=gs();
  if(!apiKey){_msgs.pop();_msgs.push({role:'assistant',content:'يرجى إضافة مفتاح الذكاء الاصطناعي في الإعدادات',time:t});_isLoading=false;renderSChat(document.getElementById('sc'));return;}
  const subjs=gsubj(_user.grade),subj=subjs.find(s=>s.id===subjectId);
  const files=(subj?.files||[]).filter(f=>f.extracted);
  if(!files.length){_msgs.pop();_msgs.push({role:'assistant',content:'لا توجد ملفات دراسية لهذه المادة بعد. يرجى مراجعة ولي الأمر.',time:t});_isLoading=false;renderSChat(document.getElementById('sc'));return;}
  const sysMap={explain:sysExplain(subjectName,files),review:sysReview(subjectName,files),test:sysTest(subjectName,files,_testN),weakness:sysWeak(subjectName,tstats(_user.id).weak,files)};
  const hist=_msgs.slice(0,-1).map(m=>({role:m.role,content:m.content}));
  try{
    const reply=await callAI(apiKey,sysMap[_chatMode],hist);
    incq(_user.id);
    _msgs.pop();_msgs.push({role:'assistant',content:reply,time:new Date().toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'})});
    if(_chatMode==='test'){const r=parseResult(reply);if(r){stest({id:gid(),userId:_user.id,subjectId,subjectName,grade:_user.grade,score:r.score,total:r.total,wrongTopics:r.wrongTopics,date:new Date().toISOString()});}}
  }catch(e){_msgs.pop();_msgs.push({role:'assistant',content:`حدث خطأ: ${e.message}`,time:t});}
  _isLoading=false;renderSChat(document.getElementById('sc'));
}

  <div style="padding:20px 16px;">
    <div style="font-size:20px;font-weight:700;margin-bottom:4px;">نتائجي</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:20px;">سجل اختباراتك ونقاط قوتك وضعفك</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
      <div class="card" style="text-align:center;padding:14px 8px;"><div style="font-size:24px;font-weight:700;color:var(--purple);">${st.total}</div><div style="font-size:10px;color:var(--text3);">اختبار</div></div>
      <div class="card" style="text-align:center;padding:14px 8px;"><div style="font-size:24px;font-weight:700;color:${st.avg>=80?'var(--teal)':st.avg>=60?'var(--amber)':'var(--red)'};">${st.avg}%</div><div style="font-size:10px;color:var(--text3);">متوسطي</div></div>
      <div class="card" style="text-align:center;padding:14px 8px;"><div style="font-size:24px;font-weight:700;color:var(--pink);">${ts.filter(t=>new Date(t.date).toDateString()===new Date().toDateString()).length}</div><div style="font-size:10px;color:var(--text3);">اليوم</div></div>
    </div>
    ${st.weak.length?`<div class="card" style="margin-bottom:20px;border-color:#FFB34740;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;">⚠️ مواضيع تحتاج مراجعة</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${st.weak.map(t=>`<span class="pill pa">${t}</span>`).join('')}</div></div>`:''}
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;">سجل الاختبارات</div>
    ${ts.length===0?`<div class="es"><div class="ei">📝</div><div class="et">لا توجد اختبارات بعد</div></div>`:[...ts].reverse().map(t=>{const p=Math.round(t.score/t.total*100);const col=p>=80?'var(--teal)':p>=60?'var(--amber)':'var(--red)';return`<div class="card" style="margin-bottom:10px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><div><div style="font-size:14px;font-weight:600;">${t.subjectName}</div><div style="font-size:12px;color:var(--text3);">${fdate(t.date)} • ${t.total} سؤال</div></div><div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:${col};">${t.score}/${t.total}</div><div style="font-size:11px;color:var(--text3);">${p}%</div></div></div><div class="pb"><div class="pf" style="width:${p}%;background:${col};"></div></div>${t.wrongTopics?.length?`<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">${t.wrongTopics.map(w=>`<span class="pill pa" style="font-size:10px;">${w}</span>`).join('')}</div>`:''}</div>`;}).join('')}
  </div>`;
}

// START
render();
</script>
</body>
</html>
