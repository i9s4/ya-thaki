<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0F1117;--bg2:#1A1D2E;--bg3:#232740;--border:#2E3250;--text:#F0F2FF;--text2:#9BA3C7;--text3:#5C6490;--purple:#7C6EFF;--purple2:#5A4FCC;--pg:#7C6EFF22;--teal:#00D4AA;--tg:#00D4AA15;--pink:#FF6B9D;--amber:#FFB347;--red:#FF5C5C;--r:14px;--rs:8px;}
body.light{--bg:#F8F9FF;--bg2:#FFFFFF;--bg3:#EEF0FF;--border:#DDE0F5;--text:#1A1D2E;--text2:#4A5080;--text3:#9BA3C7;--purple:#5A4FCC;--purple2:#7C6EFF;--pg:#7C6EFF18;--teal:#00A886;--tg:#00D4AA12;--pink:#E8527A;--amber:#CC8800;--red:#CC3333;}
html,body{height:100%;font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--text);direction:rtl;}
#app{min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Cairo',system-ui;font-size:14px;font-weight:600;transition:opacity .2s,transform .1s;}
.btn:active{transform:scale(.97);}
.btn-p{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;}
.btn-p:hover{opacity:.9;}
.btn-s{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-s:hover{border-color:var(--purple);color:var(--purple);}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-g:hover{background:var(--bg3);}
.btn-d{background:#FF5C5C22;color:var(--red);border:1px solid #FF5C5C33;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-lg{padding:14px 28px;font-size:16px;}
.btn-f{width:100%;}
input[type=text],input[type=email],input[type=password],input[type=number],input[type=time],textarea,select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:11px 14px;font-size:14px;font-family:'Cairo',system-ui;color:var(--text);direction:rtl;transition:border-color .2s;}

input::placeholder,textarea::placeholder{color:var(--text3);}
.lbl{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.ig{margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}

.pp{background:var(--pg);color:var(--purple);}
.pt{background:var(--tg);color:var(--teal);}
.pa{background:#FFB34720;color:var(--amber);}
.pr{background:#FF5C5C18;color:var(--red);}
.pk{background:#FF6B9D18;color:var(--pink);}
.divt{display:flex;align-items:center;gap:10px;margin:16px 0;}
.divt span{font-size:12px;color:var(--text3);white-space:nowrap;}
.divt::before,.divt::after{content:'';flex:1;height:1px;background:var(--border);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.av-sm{width:32px;height:32px;font-size:12px;}
.av-md{width:40px;height:40px;font-size:15px;}
.av-p{background:linear-gradient(135deg,#7C6EFF,#5A4FCC);color:#fff;}
.av-k{background:linear-gradient(135deg,#FF6B9D,#CC3D6E);color:#fff;}
.av-t{background:linear-gradient(135deg,#00D4AA,#00A886);color:#fff;}
.av-a{background:linear-gradient(135deg,#FFB347,#CC8800);color:#fff;}

.pb{height:4px;background:var(--border);border-radius:99px;overflow:hidden;}
.pf{height:100%;border-radius:99px;transition:width .4s ease;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}

.mt{font-size:17px;font-weight:700;color:var(--text);}
.tc{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;}

.si{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .15s;border:1px solid transparent;}

.si.ac{background:var(--pg);color:var(--purple);border-color:var(--pg);}
.sbot{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);}
.mc{flex:1;overflow-y:auto;}
.ph{padding:24px 24px 0;margin-bottom:20px;}
.pt2{font-size:22px;font-weight:700;color:var(--text);}
.ps{font-size:13px;color:var(--text3);margin-top:4px;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:0 24px;margin-bottom:24px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.sv{font-size:28px;font-weight:700;}
.sl{font-size:11px;color:var(--text3);margin-top:4px;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);}
.ti{padding:12px 20px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-weight:500;}
.ti:hover{color:var(--text2);}
.ti.ac{color:var(--purple);border-bottom-color:var(--purple);}
.es{text-align:center;padding:48px 24px;}
.ei{font-size:48px;margin-bottom:12px;}
.et{font-size:16px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.esb{font-size:13px;color:var(--text3);margin-bottom:20px;}
.tz{border:1.5px dashed var(--border);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.tz:hover,.tz.do{border-color:var(--purple);background:var(--pg);}
.bn{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:8px 0;z-index:100;}
.bni{display:flex;justify-content:space-around;}
.bi{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;color:var(--text3);font-size:10px;}
.bi.ac{color:var(--purple);}
.bic{font-size:20px;}
.sw-t{width:38px;height:22px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0;}
.sw-t.on{background:var(--purple);border-color:var(--purple);}
.sw-th{position:absolute;top:2px;right:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;}
.sw-t.on .sw-th{transform:translateX(-16px);}
.wc{display:flex;align-items:flex-end;gap:6px;height:60px;}
.wb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.wbr{width:100%;border-radius:4px 4px 0 0;min-height:4px;background:var(--pg);}
.wbr.td{background:var(--purple);}
.wd{font-size:9px;color:var(--text3);}
.bub{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.7;}
.bai{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:16px 16px 4px 16px;}
.bur{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;border-radius:16px 16px 16px 4px;}
.sp{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:sp .6s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.ldg{display:flex;align-items:center;justify-content:center;min-height:200px;}
@media(max-width:768px){.sb{display:none;}.sg{grid-template-columns:repeat(2,1fr);padding:0 16px;}.ph{padding:16px 16px 0;}.bn{display:block;}#app{padding-bottom:70px;}}
</style>

<script>
// ===== SUPABASE CONFIG =====
const SB_URL = 'https://swdqzeimpvmkszfaqmjk.supabase.co';

// ===== GLOBALS =====
let _theme = localStorage.getItem('yt_theme') || 'dark';

let _spage = 'home';
let _params = {};

let _chatMode = 'explain';

setTheme(_theme);

function toast(msg, type = '') {
  const c = document.getElementById('tc');

  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3000);

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function fdate(iso) { return new Date(iso).toLocaleDateString('ar-KW', { year: 'numeric', month: 'short', day: 'numeric' }); }
function glabel(g) { const n = { 1: 'أول', 2: 'ثاني', 3: 'ثالث', 4: 'رابع', 5: 'خامس', 6: 'سادس', 7: 'سابع', 8: 'ثامن', 9: 'تاسع', 10: 'عاشر', 11: 'حادي عشر', 12: 'ثاني عشر' }; return `الصف ${n[g] || g}`; }
function avclass(name) { const cs = ['av-p', 'av-k', 'av-t', 'av-a', 'av-b']; return cs[name.charCodeAt(0) % cs.length]; }

function loading(id) { document.getElementById(id).innerHTML = '<div class="ldg"><div class="sp" style="width:40px;height:40px;"></div></div>'; }

// ===== SUPABASE DB =====
async function getSettings() {
  const { data } = await sb.from('settings').select('*').limit(1).single();
  return data;
}
async function saveSettings(obj) {
  const existing = await getSettings();
  if (existing) { await sb.from('settings').update(obj).eq('id', existing.id); }
  else { await sb.from('settings').insert(obj); }
}
async function getUsers() {
  const { data } = await sb.from('users').select('*').order('created_at');
  return data || [];
}
async function getUserById(id) {
  const { data } = await sb.from('users').select('*').eq('id', id).single();
  return data;
}
async function getUserByEmail(email) {
  const { data } = await sb.from('users').select('*').eq('email', email).single();
  return data;
}
async function saveUser(user) {
  const existing = await getUserById(user.id).catch(() => null);
  if (existing) { await sb.from('users').update(user).eq('id', user.id); }
  else { await sb.from('users').insert(user); }
}
async function deleteUser(id) { await sb.from('users').delete().eq('id', id); }
async function getSubjects(grade) {
  const { data } = await sb.from('subjects').select('*').eq('grade', grade).order('created_at');
  return data || [];
}
async function saveSubject(subj) {
  const { data: existing } = await sb.from('subjects').select('id').eq('id', subj.id).single();
  if (existing) { await sb.from('subjects').update(subj).eq('id', subj.id); }
  else { await sb.from('subjects').insert(subj); }
}
async function deleteSubject(id) { await sb.from('subjects').delete().eq('id', id); }
async function getFiles(subjectId) {
  const { data } = await sb.from('files').select('*').eq('subject_id', subjectId).order('created_at');
  return data || [];
}
async function saveFile(file) { await sb.from('files').insert(file); }
async function deleteFile(id) { await sb.from('files').delete().eq('id', id); }
async function getTests(userId) {
  const { data } = await sb.from('tests').select('*').eq('user_id', userId).order('created_at');
  return data || [];
}
async function getAllTests() {
  const { data } = await sb.from('tests').select('*').order('created_at');
  return data || [];
}
async function saveTest(test) { await sb.from('tests').insert(test); }
async function canAsk(userId) {
  const user = await getUserById(userId);
  if (!user) return false;
  if (user.limit_open) return true;
  const today = new Date().toDateString();
  const lastDate = user.last_date ? new Date(user.last_date).toDateString() : '';
  if (lastDate !== today) return true;
  return (user.questions_today || 0) < (user.daily_limit || 20);
}
async function incQuestions(userId) {
  const user = await getUserById(userId);
  if (!user) return;
  const today = new Date().toDateString();
  const lastDate = user.last_date ? new Date(user.last_date).toDateString() : '';
  const qt = lastDate !== today ? 1 : (user.questions_today || 0) + 1;
  await sb.from('users').update({ questions_today: qt, last_date: new Date().toISOString() }).eq('id', userId);
}
async function getRemaining(userId) {
  const user = await getUserById(userId);
  if (!user) return 0;
  if (user.limit_open) return 999;
  const today = new Date().toDateString();
  const lastDate = user.last_date ? new Date(user.last_date).toDateString() : '';
  const used = lastDate === today ? (user.questions_today || 0) : 0;
  return Math.max(0, (user.daily_limit || 20) - used);
}
function isWithinHours(user) {
  if (!user.allowed_hours || user.allowed_hours.open) return true;
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const [fh, fm] = (user.allowed_hours.from || '00:00').split(':').map(Number);
  const [th, tm] = (user.allowed_hours.to || '23:59').split(':').map(Number);
  return cur >= fh * 60 + fm && cur <= th * 60 + tm;
}
function calcStats(tests) {
  if (!tests.length) return { total: 0, avg: 0, weak: [] };
  const avg = Math.round(tests.reduce((s, t) => s + (t.score / t.total * 100), 0) / tests.length);
  const wm = {};
  tests.forEach(t => (t.wrong_topics || []).forEach(w => { wm[w] = (wm[w] || 0) + 1; }));
  const weak = Object.entries(wm).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([t]) => t);
  return { total: tests.length, avg, weak };
}

// ===== INIT DB TABLES =====
async function initTables() {
  await sb.rpc('exec_sql', { sql: `
    CREATE TABLE IF NOT EXISTS settings (id SERIAL PRIMARY KEY, api_key TEXT, admin_email TEXT, admin_name TEXT, created_at TIMESTAMPTZ DEFAULT NOW());
    CREATE TABLE IF NOT EXISTS users (id TEXT PRIMARY KEY, name TEXT, email TEXT UNIQUE, password TEXT, grade INT, is_admin BOOLEAN DEFAULT FALSE, approved BOOLEAN DEFAULT FALSE, daily_limit INT DEFAULT 20, limit_open BOOLEAN DEFAULT FALSE, allowed_hours JSONB DEFAULT '{"open":true}', questions_today INT DEFAULT 0, last_date TIMESTAMPTZ, created_at TIMESTAMPTZ DEFAULT NOW());
    CREATE TABLE IF NOT EXISTS subjects (id TEXT PRIMARY KEY, grade INT, name TEXT, icon TEXT, color TEXT, created_at TIMESTAMPTZ DEFAULT NOW());
    CREATE TABLE IF NOT EXISTS files (id TEXT PRIMARY KEY, subject_id TEXT, name TEXT, size BIGINT, extracted_text TEXT, extracted BOOLEAN DEFAULT FALSE, created_at TIMESTAMPTZ DEFAULT NOW());
    CREATE TABLE IF NOT EXISTS tests (id TEXT PRIMARY KEY, user_id TEXT, subject_id TEXT, subject_name TEXT, grade INT, score INT, total INT, wrong_topics JSONB DEFAULT '[]', created_at TIMESTAMPTZ DEFAULT NOW());
  `}).catch(() => {});
}

// ===== AI =====
async function callAI(apiKey, system, messages) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
    body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 2048, system, messages })
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error?.message || `خطأ ${r.status}`); }
  const d = await r.json();
  return d.content?.map(b => b.text || '').join('') || '';
}
async function extractPDF(file, apiKey) {
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload = async e => {
      try {
        const b64 = e.target.result.split(',')[1];
        const r = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: 'claude-opus-4-5', max_tokens: 4096, messages: [{ role: 'user', content: [{ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } }, { type: 'text', text: 'استخرج كل النص من هذا الملف بدقة. لا تضف أي تعليق، فقط النص.' }] }] })
        });
        const d = await r.json();
        res(d.content?.map(b => b.text || '').join('') || '');
      } catch { res(''); }
    };
    fr.readAsDataURL(file);
  });
}
function parseResult(msg) {
  const m = msg.match(/RESULT:\s*(\d+)\/(\d+)\s*\|\s*(.+)/);
  if (!m) return null;
  return { score: parseInt(m[1]), total: parseInt(m[2]), wrongTopics: m[3].split(',').map(t => t.trim()).filter(Boolean) };
}

async function doSetup() {
  const n = document.getElementById('sn').value.trim(), e = document.getElementById('se').value.trim(), p = document.getElementById('sp').value, k = document.getElementById('sk').value.trim();
  if (!n || !e || !p || !k) { toast('يرجى تعبئة جميع الحقول', 'er'); return; }
  if (p.length < 8) { toast('كلمة المرور 8 أحرف على الأقل', 'er'); return; }
  if (!k.startsWith('sk-ant-')) { toast('مفتاح الذكاء الاصطناعي غير صحيح', 'er'); return; }
  const btn = document.querySelector('#app .btn');
  if (btn) { btn.textContent = 'جاري الإنشاء...'; btn.disabled = true; }
  try {
    await initTables();
    const id = gid();
    await saveSettings({ api_key: k, admin_email: e, admin_name: n });
    await saveUser({ id, name: n, email: e, password: p, is_admin: true, approved: true, grade: 0, created_at: new Date().toISOString() });
    toast('تم إنشاء الحساب', 'ok');
    render();
  } catch (err) { toast('حدث خطأ: ' + err.message, 'er'); if (btn) { btn.textContent = 'إنشاء الحساب والبدء'; btn.disabled = false; } }
}

function renderLogin(app) {

        <div style="font-size:13px;color:var(--text3);margin-top:4px;">المساعد الدراسي الذكي لأبنائك</div>
      </div>
      <div class="card" style="border-radius:20px;padding:24px;" id="lcard"></div>

}
function renderLoginForm() {
  document.getElementById('lcard').innerHTML = `
    <div style="font-size:17px;font-weight:700;margin-bottom:20px;">${_lmode === 'login' ? 'تسجيل الدخول' : 'إنشاء حساب'}</div>
    ${_lmode === 'register' ? '<div style="font-size:12px;color:var(--text3);margin-bottom:16px;">سيتم مراجعة حسابك من قِبل ولي الأمر قبل التفعيل</div>' : ''}
    ${_lmode === 'register' ? '<div class="ig"><label class="lbl">الاسم الكامل</label><input id="ln" type="text" placeholder="اسمك"/></div>' : ''}
    <div class="ig"><label class="lbl">البريد الإلكتروني</label><input id="le" type="email" placeholder="example@mail.com"/></div>
    <div class="ig"><label class="lbl">كلمة المرور</label><input id="lp" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    ${_lmode === 'register' ? `<div class="ig"><label class="lbl">الصف الدراسي</label><select id="lg">${Array.from({ length: 12 }, (_, i) => i + 1).map(g => `<option value="${g}">الصف ${g}</option>`).join('')}</select></div>` : ''}
    <button class="btn btn-p btn-f btn-lg" id="lbtn" onclick="doLogin()" style="margin-bottom:14px;">${_lmode === 'login' ? 'دخول' : 'إرسال طلب التسجيل'}</button>
    <div class="divt"><span>أو</span></div>
    <button class="btn btn-g btn-f" onclick="_lmode='${_lmode === 'login' ? 'register' : 'login'}';renderLoginForm();">${_lmode === 'login' ? 'إنشاء حساب جديد' : 'لدي حساب — تسجيل الدخول'}</button>`;
}
async function doLogin() {
  const e = document.getElementById('le').value.trim(), p = document.getElementById('lp').value;
  if (!e || !p) { toast('يرجى تعبئة الحقول', 'er'); return; }
  const btn = document.getElementById('lbtn');
  if (btn) { btn.textContent = 'جاري التحقق...'; btn.disabled = true; }
  if (_lmode === 'login') {
    try {
      const u = await getUserByEmail(e);
      if (!u) { toast('البريد غير مسجل', 'er'); btn.textContent = 'دخول'; btn.disabled = false; return; }
      if (u.password !== p) { toast('كلمة المرور غير صحيحة', 'er'); btn.textContent = 'دخول'; btn.disabled = false; return; }
      if (!u.approved && !u.is_admin) { toast('حسابك قيد المراجعة', 'er'); btn.textContent = 'دخول'; btn.disabled = false; return; }
      toast(`أهلاً ${u.name}`, 'ok');
      setSession(u); _user = u; render();
    } catch (err) { toast('خطأ: ' + err.message, 'er'); if (btn) { btn.textContent = 'دخول'; btn.disabled = false; } }
  } else {
    const n = document.getElementById('ln')?.value.trim(), g = document.getElementById('lg')?.value;
    if (!n || !e || !p) { toast('يرجى تعبئة جميع الحقول', 'er'); btn.textContent = 'إرسال طلب التسجيل'; btn.disabled = false; return; }
    if (p.length < 8) { toast('كلمة المرور 8 أحرف على الأقل', 'er'); btn.textContent = 'إرسال طلب التسجيل'; btn.disabled = false; return; }
    try {
      const existing = await getUserByEmail(e).catch(() => null);
      if (existing) { toast('البريد مسجل مسبقاً', 'er'); btn.textContent = 'إرسال طلب التسجيل'; btn.disabled = false; return; }
      await saveUser({ id: gid(), name: n, email: e, password: p, grade: parseInt(g), is_admin: false, approved: false, daily_limit: 20, limit_open: false, allowed_hours: { open: true, from: '14:00', to: '22:00' }, questions_today: 0, created_at: new Date().toISOString() });
      toast('تم إرسال الطلب — انتظر موافقة ولي الأمر', 'ok');
      _lmode = 'login'; renderLoginForm();
    } catch (err) { toast('خطأ: ' + err.message, 'er'); if (btn) { btn.textContent = 'إرسال طلب التسجيل'; btn.disabled = false; } }
  }
}

function showAddSubj(grade) {
  const icons = ['📐', '🔬', '⚗️', '🧬', '📖', '🌍', '💻', '🎨', '🏛️', '📝', '🔢', '🔭'];
  const cols = ['var(--pg)', 'var(--tg)', '#FF6B9D18', '#FFB34720', '#4A9EFF18'];
  window._si = icons[0];
  const ov = document.createElement('div'); ov.className = 'mo';
  ov.innerHTML = `<div class="md"><div class="mh"><div class="mt">إضافة مادة جديدة</div><button class="btn btn-g" style="padding:6px 10px;" onclick="this.closest('.mo').remove()">✕</button></div><div class="ig"><label class="lbl">اسم المادة</label><input id="mn" type="text" placeholder="مثال: رياضيات، فيزياء..."/></div><div class="ig"><label class="lbl">أيقونة</label><div style="display:flex;flex-wrap:wrap;gap:8px;">${icons.map((ic, i) => `<div onclick="this.parentNode.querySelectorAll('div').forEach(x=>x.style.background='var(--bg3)');this.style.background='var(--pg)';window._si='${ic}';" style="width:40px;height:40px;border-radius:10px;background:${i === 0 ? 'var(--pg)' : 'var(--bg3)'};border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;">${ic}</div>`).join('')}</div></div><button class="btn btn-p btn-f" id="addsubjbtn" onclick="addSubject(${grade})">إضافة</button></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}
async function addSubject(grade) {
  const n = document.getElementById('mn').value.trim();
  if (!n) { toast('أدخل اسم المادة', 'er'); return; }
  const btn = document.getElementById('addsubjbtn'); btn.textContent = 'جاري الإضافة...'; btn.disabled = true;
  const cols = ['var(--pg)', 'var(--tg)', '#FF6B9D18', '#FFB34720', '#4A9EFF18'];
  await saveSubject({ id: gid(), grade, name: n, icon: window._si || '📚', color: cols[Math.floor(Math.random() * cols.length)], created_at: new Date().toISOString() });
  document.querySelector('.mo')?.remove();
  toast('تمت الإضافة', 'ok');
  renderASubjects(document.getElementById('ap'));
}

function showUpload(subjectId, grade) {
  const ov = document.createElement('div'); ov.className = 'mo';
  ov.innerHTML = `<div class="md"><div class="mh"><div class="mt">رفع ملف PDF</div><button class="btn btn-g" style="padding:6px 10px;" onclick="this.closest('.mo').remove()">✕</button></div><div class="tz" id="dz"><div style="font-size:32px;margin-bottom:10px;">📂</div><div style="font-size:14px;font-weight:600;color:var(--text2);">اسحب الملف هنا أو اضغط للاختيار</div><div style="font-size:12px;color:var(--text3);margin-top:4px;">PDF فقط — حتى 50MB</div><input type="file" id="fi" accept=".pdf" style="display:none;"/><button class="btn btn-s" style="margin-top:12px;" onclick="document.getElementById('fi').click()">اختر ملف</button></div><div id="ust" style="margin-top:12px;display:none;"><div style="display:flex;align-items:center;gap:10px;"><div class="sp"></div><div id="umsg" style="font-size:13px;color:var(--text2);">جاري رفع الملف...</div></div></div></div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  const dz = document.getElementById('dz'), fi = document.getElementById('fi');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('do'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('do'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('do'); handleFile(e.dataTransfer.files[0]); });
  fi.addEventListener('change', () => handleFile(fi.files[0]));
  async function handleFile(file) {
    if (!file) return;
    if (file.type !== 'application/pdf') { toast('يرجى اختيار ملف PDF', 'er'); return; }
    if (file.size > 50 * 1024 * 1024) { toast('الملف أكبر من 50MB', 'er'); return; }
    document.getElementById('ust').style.display = 'block'; dz.style.opacity = '.5'; dz.style.pointerEvents = 'none';
    const fid = gid();
    await saveFile({ id: fid, subject_id: subjectId, name: file.name, size: file.size, extracted: false, extracted_text: '', created_at: new Date().toISOString() });
    document.getElementById('umsg').textContent = 'جاري استخراج النص من الملف...';
    try {
      const s = await getSettings();
      const txt = await extractPDF(file, s.api_key);
      await sb.from('files').update({ extracted: true, extracted_text: txt }).eq('id', fid);
      toast('تم رفع الملف وتجهيزه', 'ok');
    } catch { toast('تم رفع الملف (تعذر استخراج النص)', 'er'); }
    ov.remove();
    renderASubjects(document.getElementById('ap'));
  }
}

async function saveStudentSettings(uid) {
  const btn = document.getElementById('savessbtn'); btn.textContent = 'جاري الحفظ...'; btn.disabled = true;
  await sb.from('users').update({

      <div style="display:flex;gap:8px;">
        <input type="text" id="ci" placeholder="${_chatMode === 'explain' ? 'اسأل عن أي موضوع...' : 'اكتب إجابتك هنا...'}" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();const v=document.getElementById('ci').value.trim();if(v)sendChat(v);}"/>
        <button class="btn btn-p" onclick="const v=document.getElementById('ci').value.trim();if(v)sendChat(v);">إرسال</button>
      </div>`}
    </div>`}
  </div>`;
  const cm = document.getElementById('cmsgs'); if (cm) cm.scrollTop = cm.scrollHeight;
}

async function sendChat(text) {
  if (_isLoading) return;
  const can = await canAsk(_user.id);
  if (!can) { toast('وصلت حد الأسئلة اليوم', 'er'); return; }
  const freshUser = await getUserById(_user.id);
  if (!isWithinHours(freshUser)) { toast('خارج وقت الدراسة', 'er'); return; }
  _isLoading = true;
  const ci = document.getElementById('ci'); if (ci) ci.value = '';
  const t = new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' });
  _msgs.push({ role: 'user', content: text, time: t });
  _msgs.push({ role: 'assistant', content: '', loading: true, time: '' });
  renderSChat(document.getElementById('sc'));
  const s = await getSettings();
  if (!s?.api_key) { _msgs.pop(); _msgs.push({ role: 'assistant', content: 'يرجى إضافة مفتاح الذكاء الاصطناعي في الإعدادات', time: t }); _isLoading = false; renderSChat(document.getElementById('sc')); return; }
  const files = await getFiles(_params.chatSubj);
  const readyFiles = files.filter(f => f.extracted);
  if (!readyFiles.length) { _msgs.pop(); _msgs.push({ role: 'assistant', content: 'لا توجد ملفات دراسية لهذه المادة بعد. يرجى مراجعة ولي الأمر.', time: t }); _isLoading = false; renderSChat(document.getElementById('sc')); return; }
  const ts = await getTests(_user.id);
  const st = calcStats(ts);
  const sysMap = {
    explain: `أنت مساعد دراسي لمادة "${_params.chatName}". استند على:\n${readyFiles.map(f => f.extracted_text).join('\n\n')}\n\nأجب بالعربية البسيطة.`,
    review: `أنت تراجع الطالب على "${_params.chatName}".\n${readyFiles.map(f => f.extracted_text).join('\n')}\n\nاطرح أسئلة وصحح بلطف.`,
    test: `أنت تدير اختباراً على "${_params.chatName}" (${_testN} سؤال).\n${readyFiles.map(f => f.extracted_text).join('\n')}\n\nاطرح سؤالاً واحداً في كل مرة. في النهاية أضف:\nRESULT: X/Y | موضوع1,موضوع2`,
    weakness: `أنت تعالج نقاط ضعف في "${_params.chatName}".\nنقاط الضعف: ${st.weak.join('،')}\n${readyFiles.map(f => f.extracted_text).join('\n')}\n\nركّز على هذه النقاط.`
  };
  const hist = _msgs.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
  try {
    const reply = await callAI(s.api_key, sysMap[_chatMode], hist);
    await incQuestions(_user.id);
    _msgs.pop(); _msgs.push({ role: 'assistant', content: reply, time: new Date().toLocaleTimeString('ar', { hour: '2-digit', minute: '2-digit' }) });
    if (_chatMode === 'test') {
      const r = parseResult(reply);
      if (r) { await saveTest({ id: gid(), user_id: _user.id, subject_id: _params.chatSubj, subject_name: _params.chatName, grade: _user.grade, score: r.score, total: r.total, wrong_topics: r.wrongTopics, created_at: new Date().toISOString() }); }
    }
  } catch (e) { _msgs.pop(); _msgs.push({ role: 'assistant', content: `حدث خطأ: ${e.message}`, time: t }); }
  _isLoading = false;
  renderSChat(document.getElementById('sc'));
}

async function renderSResults(c) {
  c.innerHTML = '<div class="ldg"><div class="sp"></div></div>';
  const ts = await getTests(_user.id);
  const st = calcStats(ts);
  c.innerHTML = `
  <div style="padding:20px 16px;">
    <div style="font-size:20px;font-weight:700;margin-bottom:4px;">نتائجي</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:20px;">سجل اختباراتك ونقاط قوتك وضعفك</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;">
      <div class="card" style="text-align:center;padding:14px 8px;"><div style="font-size:24px;font-weight:700;color:var(--purple);">${st.total}</div><div style="font-size:10px;color:var(--text3);">اختبار</div></div>
      <div class="card" style="text-align:center;padding:14px 8px;"><div style="font-size:24px;font-weight:700;color:${st.avg >= 80 ? 'var(--teal)' : st.avg >= 60 ? 'var(--amber)' : 'var(--red)'};">${st.avg}%</div><div style="font-size:10px;color:var(--text3);">متوسطي</div></div>
      <div class="card" style="text-align:center;padding:14px 8px;"><div style="font-size:24px;font-weight:700;color:var(--pink);">${ts.filter(t => new Date(t.created_at).toDateString() === new Date().toDateString()).length}</div><div style="font-size:10px;color:var(--text3);">اليوم</div></div>
    </div>
    ${st.weak.length ? `<div class="card" style="margin-bottom:20px;border-color:#FFB34740;"><div style="font-size:13px;font-weight:600;margin-bottom:10px;">⚠️ مواضيع تحتاج مراجعة</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${st.weak.map(t => `<span class="pill pa">${t}</span>`).join('')}</div></div>` : ''}
    <div style="font-size:14px;font-weight:600;margin-bottom:12px;">سجل الاختبارات</div>
    ${ts.length === 0 ? `<div class="es"><div class="ei">📝</div><div class="et">لا توجد اختبارات بعد</div></div>` : [...ts].reverse().map(t => { const p = Math.round(t.score / t.total * 100); const col = p >= 80 ? 'var(--teal)' : p >= 60 ? 'var(--amber)' : 'var(--red)'; return `<div class="card" style="margin-bottom:10px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><div><div style="font-size:14px;font-weight:600;">${t.subject_name}</div><div style="font-size:12px;color:var(--text3);">${fdate(t.created_at)} • ${t.total} سؤال</div></div><div style="text-align:center;"><div style="font-size:22px;font-weight:700;color:${col};">${t.score}/${t.total}</div><div style="font-size:11px;color:var(--text3);">${p}%</div></div></div><div class="pb"><div class="pf" style="width:${p}%;background:${col};"></div></div>${(t.wrong_topics || []).length ? `<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;">${(t.wrong_topics || []).map(w => `<span class="pill pa" style="font-size:10px;">${w}</span>`).join('')}</div>` : ''}</div>`; }).join('')}
  </div>`;
}

// START
render();
</script>
</body>
</html>
